<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cinematic 3D Globe Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
#info { position: fixed; top: 12px; left: 12px; color: #fff; font-size: 14px; text-shadow: 0 0 10px rgba(0,0,0,1); pointer-events: none; z-index: 10; }
#planet-selector {
    position: fixed;
    top: 50px;
    left: 12px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 80vh;
    overflow-y: auto;
    backdrop-filter: blur(5px);
    z-index: 10;
}
.planet-link {
    color: #aaa;
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 4px;
    transition: all 0.3s;
    background: rgba(255,255,255,0.05);
}
.planet-link:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    cursor: pointer;
    transform: translateX(5px);
}
.planet-link.active {
    background: rgba(0, 150, 255, 0.3);
    color: #fff;
    border-left: 3px solid #0099ff;
}
#controls {
    position: fixed;
    bottom: 20px;
    left: 12px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-size: 13px;
    backdrop-filter: blur(5px);
    z-index: 10;
    width: 200px;
}
input[type=range] { width: 100%; margin-top: 8px; cursor: pointer; }
</style>
</head>
<body>
<div id="info">Cinematic Globe Viewer · <span id="planet-name">Earth</span></div>
<div id="planet-selector"></div>
<div id="controls">
    <label for="cloud-coverage">Cloud Coverage: <span id="cloud-val">50%</span></label>
    <input type="range" id="cloud-coverage" min="0" max="100" value="50">
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Renderer Setup ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 3;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- Shared State ---
const sunDirection = new THREE.Vector3(5, 2, 5).normalize();
const commonUniforms = {
    uSunDir: { value: sunDirection },
    uTime: { value: 0 },
    uCloudCoverage: { value: 0.5 },
    uCloudSeed: { value: new THREE.Vector3(0, 0, 0) },
    uCloudScale: { value: 2.2 }
};

// --- Starfield ---
const starCount = 5000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 1000;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));

// --- Noise & FBM Library ---
const noiseGLSL = `
    uniform vec3 uCloudSeed;
    uniform float uCloudScale;

    float hash(vec3 p) { return fract(sin(dot(p + uCloudSeed, vec3(127.1, 311.7, 74.7))) * 43758.5453123); }
    float noise(vec3 p) {
        vec3 i = floor(p); vec3 f = fract(p);
        f = f*f*(3.0-2.0*f);
        return mix(mix(mix(hash(i), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
                   mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
    }
    float fbm(vec3 p) {
        float v = 0.0, a = 0.5;
        for (int i=0; i<5; i++) { v += a * noise(p); p *= 2.05; a *= 0.5; }
        return v;
    }
    // Domain warping for "Earth-like" swirly clouds
    float warpedFbm(vec3 p, float time) {
        vec3 q = vec3(fbm(p + vec3(0.0, 0.0, 0.0)),
                      fbm(p + vec3(5.2, 1.3, 0.5)),
                      fbm(p + vec3(2.4, 4.2, 1.1)));
        vec3 r = vec3(fbm(p + 4.0 * q + vec3(1.7, 9.2, 2.3) + time * 0.15),
                      fbm(p + 4.0 * q + vec3(8.3, 2.8, 6.1) - time * 0.1),
                      fbm(p + 4.0 * q + vec3(3.1, 5.5, 4.4)));
        return fbm(p + 4.0 * r);
    }
`;

// --- Planet Surface ---
const surfaceMat = new THREE.MeshStandardMaterial({
    roughness: 0.8,
    metalness: 0.2
});

const surfaceUniforms = {
    uSunDir: commonUniforms.uSunDir,
    uNightMap: { value: null },
    uSpecularMap: { value: null },
    uTime: commonUniforms.uTime,
    uCloudCoverage: commonUniforms.uCloudCoverage,
    uCloudSeed: commonUniforms.uCloudSeed,
    uCloudScale: commonUniforms.uCloudScale
};

surfaceMat.onBeforeCompile = (shader) => {
    shader.uniforms.uSunDir = surfaceUniforms.uSunDir;
    shader.uniforms.uNightMap = surfaceUniforms.uNightMap;
    shader.uniforms.uSpecularMap = surfaceUniforms.uSpecularMap;
    shader.uniforms.uTime = surfaceUniforms.uTime;
    shader.uniforms.uCloudCoverage = surfaceUniforms.uCloudCoverage;
    shader.uniforms.uCloudSeed = surfaceUniforms.uCloudSeed;
    shader.uniforms.uCloudScale = surfaceUniforms.uCloudScale;

    shader.vertexShader = `
        varying vec3 vLocalNormal;
        ${shader.vertexShader}
    `.replace(
        '#include <beginnormal_vertex>',
        `#include <beginnormal_vertex>
        vLocalNormal = normal;`
    );
    
    shader.fragmentShader = `
        uniform vec3 uSunDir;
        uniform sampler2D uNightMap;
        uniform sampler2D uSpecularMap;
        uniform float uTime;
        uniform float uCloudCoverage;
        varying vec3 vLocalNormal;
        ${noiseGLSL}
    \n` + shader.fragmentShader;

    shader.fragmentShader = shader.fragmentShader.replace(
        '#include <map_fragment>',
        `
        #include <map_fragment>
        
        vec3 sunDir = normalize(uSunDir);
        float dotNL = dot(vNormal, sunDir);
        float dayWeight = smoothstep(-0.15, 0.15, dotNL);
        
        // 1. Specular from Map
        float specMask = texture2D(uSpecularMap, vMapUv).r;
        
        // 2. Night Lights from Map
        vec3 nightLights = texture2D(uNightMap, vMapUv).rgb * 2.0;

        // 3. Cloud shadows (Warped FBM for swirly patterns)
        vec3 cloudPos = vLocalNormal * vec3(1.5, 1.0, 1.0) + vec3(uTime * 0.005, 0.0, 0.0);
        float cloudVal = warpedFbm(cloudPos * uCloudScale, uTime * 0.1);
        
        float clouds = smoothstep(1.0 - uCloudCoverage, 1.3 - uCloudCoverage, cloudVal);
        float cloudShadow = mix(1.0, 0.5, clouds * dayWeight);

        // Apply
        diffuseColor.rgb *= (dayWeight * cloudShadow);
        diffuseColor.rgb += (nightLights * (1.0 - dayWeight));
        `
    );
};

const planetMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), surfaceMat);
scene.add(planetMesh);

// --- Clouds ---
const cloudMat = new THREE.MeshStandardMaterial({
    transparent: true,
    opacity: 1.0,
    depthWrite: false,
    color: 0xffffff,
    map: new THREE.Texture() // Force UV varyings
});

cloudMat.onBeforeCompile = (shader) => {
    shader.uniforms.uSunDir = commonUniforms.uSunDir;
    shader.uniforms.uTime = commonUniforms.uTime;
    shader.uniforms.uCloudCoverage = commonUniforms.uCloudCoverage;
    shader.uniforms.uCloudSeed = commonUniforms.uCloudSeed;
    shader.uniforms.uCloudScale = commonUniforms.uCloudScale;

    shader.vertexShader = `
        varying vec3 vLocalNormal;
        ${shader.vertexShader}
    `.replace(
        '#include <beginnormal_vertex>',
        `#include <beginnormal_vertex>
        vLocalNormal = normal;`
    );

    shader.fragmentShader = `
        uniform vec3 uSunDir;
        uniform float uTime;
        uniform float uCloudCoverage;
        varying vec3 vLocalNormal;
        ${noiseGLSL}
    \n` + shader.fragmentShader;

    shader.fragmentShader = shader.fragmentShader.replace(
        '#include <map_fragment>',
        `
        #include <map_fragment>
        vec3 cloudPos = vLocalNormal * vec3(1.5, 1.0, 1.0) + vec3(uTime * 0.005, 0.0, 0.0);
        float cloudVal = warpedFbm(cloudPos * uCloudScale, uTime * 0.1);
        
        float clouds = smoothstep(1.0 - uCloudCoverage, 1.3 - uCloudCoverage, cloudVal);
        float lit = smoothstep(-0.1, 0.2, dot(vNormal, normalize(uSunDir)));
        
        diffuseColor.rgb = vec3(0.95, 0.95, 1.0);
        diffuseColor.a = clouds * lit * 0.95;
        `
    );
};

const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(1.015, 128, 128), cloudMat);
scene.add(cloudMesh);

// --- Atmosphere ---
const atmoMat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: { uSunDir: commonUniforms.uSunDir },
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPos.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        uniform vec3 cameraPosition;
        uniform vec3 uSunDir;
        void main() {
            vec3 viewDir = normalize(cameraPosition - vWorldPosition);
            float fresnel = pow(1.0 - dot(vNormal, viewDir), 4.0);
            float dotNL = dot(normalize(vWorldPosition), normalize(uSunDir));
            float lit = smoothstep(-0.3, 0.5, dotNL);
            vec3 color = mix(vec3(0.05, 0.1, 0.3), vec3(0.2, 0.5, 1.0), lit);
            gl_FragColor = vec4(color * fresnel * 2.0, fresnel * lit * 0.7);
        }
    `
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.08, 128, 128), atmoMat));

// --- Lighting ---
const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
sunLight.position.copy(sunDirection).multiplyScalar(10);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.1));

// --- Planet Data & Switching ---
const planets = [
    { name: 'Altiplano', base: 'Map_Altiplano', seed: [12.3, 45.6, 78.9], scale: 1.8 },
    { name: 'Olympia', base: 'Map_Olympia', seed: [98.7, 65.4, 32.1], scale: 3.5 },
    { name: 'Concord', base: 'Map_Concord', seed: [42.0, 42.0, 42.0], scale: 1.2 },
    { name: 'Damso', base: 'Map_Damso', seed: [1.1, 2.2, 3.3], scale: 4.0 },
    { name: 'Medina', base: 'Map_Medina', seed: [55.5, 66.6, 77.7], scale: 2.5 },
    { name: 'Novaya', base: 'Map_Novaya', seed: [8.8, 9.9, 0.0], scale: 1.5 },
    { name: 'Pacifica', base: 'Map_Pacifica', seed: [33.3, 22.2, 11.1], scale: 2.0 },
    { name: 'Refuge', base: 'Map_Refuge', seed: [7.7, 6.6, 5.5], scale: 3.0 },
    { name: 'Schwarzvaal', base: 'Map_Schwartzvaal', seed: [100.1, 200.2, 300.3], scale: 0.8 },
    { name: 'Xing Cheng', base: 'Map_XingCheng', seed: [0.1, 0.2, 0.3], scale: 5.0 }
];

const texLoader = new THREE.TextureLoader();
const cache = {};

function switchPlanet(name) {
    const p = planets.find(x => x.name === name);
    if (!p) return;

    document.getElementById('planet-name').textContent = name;
    document.querySelectorAll('.planet-link').forEach(l => l.classList.toggle('active', l.textContent === name));

    // Update cloud pattern parameters
    commonUniforms.uCloudSeed.value.set(p.seed[0], p.seed[1], p.seed[2]);
    commonUniforms.uCloudScale.value = p.scale;

    const loadTexture = (suffix) => {
        const path = `/pngs/${p.base}${suffix}.png`;
        if (cache[path]) return Promise.resolve(cache[path]);
        return new Promise(res => {
            texLoader.load(path, t => {
                t.colorSpace = THREE.SRGBColorSpace;
                t.anisotropy = renderer.capabilities.getMaxAnisotropy();
                t.wrapS = THREE.RepeatWrapping;
                cache[path] = t;
                res(t);
            });
        });
    };

    Promise.all([
        loadTexture('_dilated'),
        loadTexture('_specular'),
        loadTexture('_bump'),
        loadTexture('_night')
    ]).then(([diffuse, spec, bump, night]) => {
        surfaceMat.map = diffuse;
        surfaceMat.bumpMap = bump;
        surfaceMat.bumpScale = 0.005;
        surfaceUniforms.uSpecularMap.value = spec;
        surfaceUniforms.uNightMap.value = night;
        surfaceMat.needsUpdate = true;
    });
}

const selector = document.getElementById('planet-selector');
planets.forEach(p => {
    const link = document.createElement('a');
    link.className = 'planet-link' + (p.name === 'Altiplano' ? ' active' : '');
    link.textContent = p.name;
    link.onclick = () => switchPlanet(p.name);
    selector.appendChild(link);
});

const cloudSlider = document.getElementById('cloud-coverage');
const cloudValDisplay = document.getElementById('cloud-val');
cloudSlider.addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    cloudValDisplay.textContent = `${val}%`;
    commonUniforms.uCloudCoverage.value = val / 100;
});

switchPlanet('Altiplano');

function animate(time) {
    requestAnimationFrame(animate);
    commonUniforms.uTime.value = time * 0.001;
    controls.update();
    planetMesh.rotation.y += 0.0005;
    cloudMesh.rotation.y += 0.0005;
    renderer.render(scene, camera);
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
