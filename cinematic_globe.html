<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cinematic 3D Globe Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
#info { position: fixed; top: 12px; left: 12px; color: #fff; font-size: 14px; text-shadow: 0 0 10px rgba(0,0,0,1); pointer-events: none; }
#planet-selector {
    position: fixed;
    top: 50px;
    left: 12px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 80vh;
    overflow-y: auto;
    backdrop-filter: blur(5px);
}
.planet-link {
    color: #aaa;
    text-decoration: none;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 4px;
    transition: all 0.3s;
    background: rgba(255,255,255,0.05);
}
.planet-link:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    cursor: pointer;
    transform: translateX(5px);
}
.planet-link.active {
    background: rgba(0, 150, 255, 0.3);
    color: #fff;
    border-left: 3px solid #0099ff;
}
</style>
</head>
<body>
<div id="info">Cinematic Globe Viewer · <span id="planet-name">Earth</span></div>
<div id="planet-selector"></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Renderer Setup ---
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 3;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.5;

// --- Shared Uniforms ---
const sunDirection = new THREE.Vector3(5, 2, 5).normalize();
const commonUniforms = {
    uSunDir: { value: sunDirection },
    uTime: { value: 0 }
};

// --- Procedural Starfield ---
function createStarfield() {
    const starCount = 5000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(starCount * 3);
    const colors = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(Math.random() * 2 - 1);
        const radius = 500 + Math.random() * 100;

        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = radius * Math.cos(phi);

        const brightness = 0.5 + Math.random() * 0.5;
        colors[i * 3] = brightness;
        colors[i * 3 + 1] = brightness;
        colors[i * 3 + 2] = brightness * 0.8 + Math.random() * 0.2;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
        size: 1.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true
    });

    return new THREE.Points(geometry, material);
}
scene.add(createStarfield());

// --- Planet Surface Shader ---
const surfaceVertexShader = `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPosition;
    void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
`;

const surfaceFragmentShader = `
    uniform sampler2D uMap;
    uniform vec3 uSunDir;
    uniform float uTime;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPosition;
    uniform vec3 cameraPosition;

    // FBM Noise for procedural effects
    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
    float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f*f*(3.0-2.0*f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        for (int i=0; i<4; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
        return v;
    }

    void main() {
        vec4 texColor = texture2D(uMap, vUv);
        vec3 normal = normalize(vNormal);
        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
        vec3 sunDir = normalize(uSunDir);

        float dotNL = dot(normal, sunDir);
        
        // 1. Daylight & Twilight (Terminator)
        // Shift smoothstep slightly to create a warm "sunset" band
        float dayWeight = smoothstep(-0.15, 0.15, dotNL);
        float twilight = smoothstep(0.2, 0.0, abs(dotNL + 0.05));
        vec3 twilightColor = vec3(1.0, 0.35, 0.1) * twilight * 0.5;

        // 2. Night Lights (Procedural "city" lights on non-blue areas)
        float isLand = smoothstep(0.1, 0.5, (texColor.r + texColor.g) * 0.5 - texColor.b * 0.5);
        float cityNoise = smoothstep(0.6, 0.9, fbm(vUv * 500.0));
        vec3 nightLights = vec3(1.0, 0.8, 0.4) * cityNoise * isLand * (1.0 - dayWeight);

        // 3. Specular (Ocean reflection)
        float waterMask = clamp(texColor.b * 1.5 - (texColor.r + texColor.g), 0.0, 1.0);
        vec3 reflectDir = reflect(-sunDir, normal);
        float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0) * waterMask * dayWeight;

        // 4. Cloud Shadows (Procedural clouds offset)
        // Use the same noise as the cloud layer but offset UVs
        vec2 cloudUv = vUv * vec2(2.0, 1.0) + vec2(uTime * 0.005, 0.0);
        float clouds = smoothstep(0.4, 0.8, fbm(cloudUv * 4.0));
        float cloudShadow = mix(1.0, 0.6, clouds * dayWeight);

        // Final Lighting Blend
        vec3 dayColor = texColor.rgb * dayWeight * cloudShadow;
        vec3 nightColor = vec3(0.02, 0.03, 0.08) * (1.0 - dayWeight); // Deep indigo ambient
        
        vec3 finalColor = dayColor + nightColor + nightLights + twilightColor + (spec * vec3(0.8, 0.9, 1.0));
        
        gl_FragColor = vec4(finalColor, 1.0);
    }
`;

const surfaceMat = new THREE.ShaderMaterial({
    uniforms: {
        uMap: { value: null },
        uSunDir: { value: commonUniforms.uSunDir.value },
        uTime: { value: 0 }
    },
    vertexShader: surfaceVertexShader,
    fragmentShader: surfaceFragmentShader
});

const planetGeometry = new THREE.SphereGeometry(1, 128, 128);
const planetMesh = new THREE.Mesh(planetGeometry, surfaceMat);
scene.add(planetMesh);

// --- Cloud Layer Shader ---
const cloudFragmentShader = `
    uniform float uTime;
    uniform vec3 uSunDir;
    varying vec2 vUv;
    varying vec3 vNormal;

    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
    float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f*f*(3.0-2.0*f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        for (int i=0; i<5; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
        return v;
    }

    void main() {
        vec2 cloudUv = vUv * vec2(2.0, 1.0) + vec2(uTime * 0.005, 0.0);
        float clouds = smoothstep(0.4, 0.8, fbm(cloudUv * 4.0));
        
        float dotNL = dot(normalize(vNormal), normalize(uSunDir));
        float lit = smoothstep(-0.1, 0.2, dotNL);
        
        // Soft clouds: white when lit, dark/transparent when not
        vec3 col = vec3(1.0) * lit;
        gl_FragColor = vec4(col, clouds * lit * 0.9);
    }
`;

const cloudMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
        uTime: { value: 0 },
        uSunDir: { value: commonUniforms.uSunDir.value }
    },
    vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormal;
        void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: cloudFragmentShader
});

const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(1.015, 128, 128), cloudMat);
scene.add(cloudMesh);

// --- Atmospheric Atmosphere Shell ---
const atmosphereMat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.BackSide,
    uniforms: {
        uSunDir: { value: commonUniforms.uSunDir.value }
    },
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPos.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        uniform vec3 cameraPosition;
        uniform vec3 uSunDir;
        void main() {
            vec3 viewDir = normalize(cameraPosition - vWorldPosition);
            vec3 normal = normalize(vNormal);
            float fresnel = pow(1.0 - dot(normal, viewDir), 4.0);
            
            float dotNL = dot(normalize(vWorldPosition), normalize(uSunDir));
            float lit = smoothstep(-0.3, 0.5, dotNL);
            
            vec3 color = mix(vec3(0.05, 0.1, 0.3), vec3(0.2, 0.5, 1.0), lit);
            gl_FragColor = vec4(color * fresnel * 2.0, fresnel * lit * 0.7);
        }
    `
});

const atmosphereMesh = new THREE.Mesh(new THREE.SphereGeometry(1.08, 128, 128), atmosphereMat);
scene.add(atmosphereMesh);

// --- Planet Management ---
const planets = [
    { name: 'Earth', path: '/pngs/Earth_dilated.png' },
    { name: 'Altiplano', path: '/pngs/Map_Altiplano_dilated.png' },
    { name: 'Olympia', path: '/pngs/Map_Olympia_dilated.png' },
    { name: 'Concord', path: '/pngs/Map_Concord_dilated.png' },
    { name: 'Damso', path: '/pngs/Map_Damso_dilated.png' },
    { name: 'Medina', path: '/pngs/Map_Medina_dilated.png' },
    { name: 'Novaya', path: '/pngs/Map_Novaya_dilated.png' },
    { name: 'Pacifica', path: '/pngs/Map_Pacifica_dilated.png' },
    { name: 'Refuge', path: '/pngs/Map_Refuge_dilated.png' },
    { name: 'Schwartzvaal', path: '/pngs/Map_Schwartzvaal_dilated.png' },
    { name: 'XingCheng', path: '/pngs/Map_XingCheng_dilated.png' }
];

const textureLoader = new THREE.TextureLoader();
const textureCache = {};

function switchPlanet(name) {
    const planet = planets.find(p => p.name === name);
    if (!planet) return;

    document.getElementById('planet-name').textContent = name;
    document.querySelectorAll('.planet-link').forEach(l => l.classList.toggle('active', l.textContent === name));

    if (textureCache[name]) {
        surfaceMat.uniforms.uMap.value = textureCache[name];
    } else {
        textureLoader.load(planet.path, (tex) => {
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            textureCache[name] = tex;
            surfaceMat.uniforms.uMap.value = tex;
        });
    }
}

// Build selector
const selector = document.getElementById('planet-selector');
planets.forEach(p => {
    const link = document.createElement('a');
    link.className = 'planet-link' + (p.name === 'Earth' ? ' active' : '');
    link.textContent = p.name;
    link.onclick = () => switchPlanet(p.name);
    selector.appendChild(link);
});

// Initial Load
switchPlanet('Earth');

// --- Animation Loop ---
function animate(time) {
    requestAnimationFrame(animate);
    const t = time * 0.001;
    
    controls.update();
    
    surfaceMat.uniforms.uTime.value = t;
    cloudMat.uniforms.uTime.value = t;
    
    planetMesh.rotation.y += 0.0005;
    cloudMesh.rotation.y += 0.0007;
    
    renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// Handle Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
