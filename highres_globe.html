<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>High-Res Planet Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050510; overflow: hidden; font-family: sans-serif; }
#info { position: fixed; top: 12px; left: 12px; color: #aaa; font: 13px/1.6 sans-serif; pointer-events: none; }
#planet-selector {
    position: fixed;
    top: 50px;
    left: 12px;
    background: rgba(10, 10, 20, 0.8);
    padding: 10px;
    border-radius: 4px;
    border: 1px solid #334;
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 80vh;
    overflow-y: auto;
}
.planet-link {
    color: #889;
    text-decoration: none;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 2px;
    transition: background 0.2s, color 0.2s;
}
.planet-link:hover {
    background: #223;
    color: #ccf;
    cursor: pointer;
}
.planet-link.active {
    background: #335;
    color: #fff;
    font-weight: bold;
}
</style>
</head>
<body>
<div id="info"><span id="planet-name">High-Res Altiplano Globe</span> (Equirectangular) · drag to rotate · scroll to zoom</div>
<div id="planet-selector"></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 2.8;

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.enableDamping = true;

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// Planet list
const planets = [
    { name: 'Altiplano', path: '/pngs/Map_Altiplano_dilated.png' },
    { name: 'Olympia', path: '/pngs/Map_Olympia_dilated.png' },
    { name: 'Concord', path: '/pngs/Map_Concord_dilated.png' },
    { name: 'Damso', path: '/pngs/Map_Damso_dilated.png' },
    { name: 'Medina', path: '/pngs/Map_Medina_dilated.png' },
    { name: 'Novaya', path: '/pngs/Map_Novaya_dilated.png' },
    { name: 'Pacifica', path: '/pngs/Map_Pacifica_dilated.png' },
    { name: 'Refuge', path: '/pngs/Map_Refuge_dilated.png' },
    { name: 'Schwarzvaal', path: '/pngs/Map_Schwartzvaal_dilated.png' },
    { name: 'Xing Cheng', path: '/pngs/Map_XingCheng_dilated.png' }
];

const texLoader = new THREE.TextureLoader();
const textures = {};

// Create Planet Selector UI
const selector = document.getElementById('planet-selector');
planets.forEach((p, i) => {
    const link = document.createElement('a');
    link.className = 'planet-link' + (p.name === 'Altiplano' ? ' active' : '');
    link.textContent = p.name;
    link.onclick = () => switchPlanet(p.name);
    selector.appendChild(link);
});

function switchPlanet(name) {
    const planet = planets.find(p => p.name === name);
    if (!planet) return;

    // Update UI
    document.getElementById('planet-name').textContent = `High-Res ${name} Globe`;
    document.querySelectorAll('.planet-link').forEach(l => {
        l.classList.toggle('active', l.textContent === name);
    });

    // Load texture
    if (!textures[name]) {
        textures[name] = texLoader.load(planet.path, (tex) => {
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            globeMat.uniforms.map.value = tex;
            globeMat.uniforms.texSize.value.set(4096, 2048);
        });
    } else {
        globeMat.uniforms.map.value = textures[name];
        globeMat.uniforms.texSize.value.set(4096, 2048);
    }
}

// Initial texture load
const initialPlanet = planets.find(p => p.name === 'Altiplano');
const initialTex = texLoader.load(initialPlanet.path, (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    textures['Altiplano'] = tex;
});

// Custom sharpening shader
const globeMat = new THREE.ShaderMaterial({
    uniforms: {
        map: { value: initialTex },
        texSize: { value: new THREE.Vector2(4096, 2048) },
        sharpness: { value: 0.8 },
        sunPos: { value: new THREE.Vector3(5, 3, 5).normalize() }
    },
    vertexShader: `
      varying vec2 vUv;
      varying vec3 vNormal;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D map;
      uniform vec2 texSize;
      uniform float sharpness;
      uniform vec3 sunPos;
      varying vec2 vUv;
      varying vec3 vNormal;

      void main() {
        vec2 off = 1.0 / texSize;
        vec4 center = texture2D(map, vUv);
        
        vec4 n = texture2D(map, vUv + vec2(0, off.y));
        vec4 s = texture2D(map, vUv + vec2(0, -off.y));
        vec4 e = texture2D(map, vUv + vec2(off.x, 0));
        vec4 w = texture2D(map, vUv + vec2(-off.x, 0));

        vec4 laplacian = (n + s + e + w) - 4.0 * center;
        vec4 sharpened = center - sharpness * laplacian;

        vec3 normal = normalize(vNormal);
        float diffuse = max(dot(normal, sunPos), 0.0);
        float ambient = 1.0; 
        vec3 light = (diffuse * 0.1 + ambient) * vec3(1.0, 1.0, 1.0);

        gl_FragColor = vec4(clamp(sharpened.rgb * light, 0.0, 1.0), 1.0);
      }
    `
});

const geometry = new THREE.SphereGeometry(1, 256, 256);
const globe = new THREE.Mesh(geometry, globeMat);
scene.add(globe);

// Atmosphere rim glow
const atmoMat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.BackSide,
    uniforms: {
        uSunDir: { value: new THREE.Vector3(5, 3, 5).normalize() },
    },
    vertexShader: `
      varying vec3 vWorldNorm;
      varying vec3 vWorldPos;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        vWorldNorm = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vWorldNorm;
      varying vec3 vWorldPos;
      uniform vec3 cameraPosition;
      uniform vec3 uSunDir;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        float rim = 1.0 - max(0.0, dot(vWorldNorm, viewDir));
        rim = pow(rim, 6.0);
        float sunDot = dot(normalize(vWorldPos), uSunDir);
        float lit = smoothstep(-0.2, 0.4, sunDot);
        vec3 col = mix(vec3(0.05, 0.1, 0.3), vec3(0.4, 0.6, 1.0), lit);
        gl_FragColor = vec4(col * rim * 1.0, rim * lit * 0.4);
      }
    `,
});

const atmo = new THREE.Mesh(new THREE.SphereGeometry(1.05, 64, 64), atmoMat);
scene.add(atmo);

function animate() {
    requestAnimationFrame(animate);
    ctrl.update();
    globe.rotation.y += 0.001;
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
