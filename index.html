<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>3D Star Map||Attack Vector</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <button id="menuToggle" aria-label="Toggle controls menu" aria-controls="controlsPanel" aria-expanded="false">&#9776;</button>
    <div id="controlsPanel">
    <div class="title">
      <h1>Hyper Links in the Ten Worlds Universe by Date Discovered</h1>
      <a href="https://cuthalion.ca">Home</a>
      <br />
      <div class="dateSpan">
        <label for="dateSlider">Date:</label>
        <input id="dateSlider" type="range" min="2110" max="2213" value="2213" />
        <span id="dateBox">2213</span>
        <div class="searchDiv">
          <input
            type="text"
            id="systemSearch"
            placeholder="Find system…"
            aria-label="Search star systems"
          />
          <button id="systemSearchBtn" type="button">Go</button>
          <span id="searchStatus" aria-live="polite"></span>
        </div>
        <h2>Hide Hyper Links</h2>
        <ul>
          <li>
            <input type="checkbox" id="allLinks" />
            <label for="allLinks">All</label>
          </li>
          <li>
            <input id="alphaLink" type="checkbox" />
            <label for="alphaLink">Alpha <em>0.6pc</em></label>
          </li>
          <li>
            <input id="betaLink" type="checkbox" />
            <label for="betaLink">Beta <em>0.9 - 1.0pc</em></label>
          </li>
          <li>
            <input id="gammaLink" type="checkbox" />
            <label for="gammaLink">Gamma <em>1.5 - 1.7pc</em></label>
          </li>
          <li>
            <input id="deltaLink" type="checkbox" />
            <label for="deltaLink">Delta <em>2.4 - 2.7pc</em></label>
          </li>
          <li>
            <input id="epsiLink" type="checkbox" />
            <label for="epsiLink">Epsilon <em>3.9 - 4.4pc</em></label>
          </li>
        </ul>
        <h2>Named Worlds</h2>
        <div id="planetList"></div>
      </div>
    </div>
    </div>
    <div id="container"></div>
    <div id="labels"></div>
    <script type="module" src="scripts/app.ts"></script>
  </body>
</html>
