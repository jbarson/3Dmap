<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';"
    />
    <title>3D Star Map||Attack Vector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <button
      id="menuToggle"
      aria-label="Toggle controls menu"
      title="Toggle controls menu"
      aria-controls="controlsPanel"
      aria-expanded="false"
    >
      &#9776;
    </button>
    <div id="controlsPanel">
      <div class="panel-header">
        <h1>Ten Worlds Universe</h1>
        <p class="panel-subtitle">Hyper Links by Date Discovered</p>
        <nav class="panel-nav">
          <a href="https://cuthalion.ca" class="nav-link">Home</a>
          <a href="/planet-detail.html" class="nav-link nav-link--highlight">Planet Detail</a>
        </nav>
      </div>
      <div class="controls-body">
        <section class="control-section">
          <div class="section-header">Timeline</div>
          <div class="date-control">
            <div class="date-display">
              <label for="dateSlider" class="date-label">Year</label>
              <span id="dateBox" class="date-value">2213</span>
            </div>
            <input id="dateSlider" type="range" min="2110" max="2213" value="2213" />
          </div>
          <div class="searchDiv">
            <input
              type="text"
              id="systemSearch"
              placeholder="Find system…"
              aria-label="Search star systems"
            />
            <button id="systemSearchBtn" type="button">Go</button>
            <span id="searchStatus" aria-live="polite"></span>
          </div>
        </section>
        <section class="control-section">
          <div class="section-header">Hide Hyper Links</div>
          <ul class="link-filters">
            <li>
              <label class="filter-row">
                <input type="checkbox" id="allLinks" />
                <span class="filter-name">All</span>
              </label>
            </li>
            <li>
              <label class="filter-row">
                <input id="alphaLink" type="checkbox" />
                <span class="filter-name">Alpha</span>
                <em class="filter-range">0.6 pc</em>
              </label>
            </li>
            <li>
              <label class="filter-row">
                <input id="betaLink" type="checkbox" />
                <span class="filter-name">Beta</span>
                <em class="filter-range">0.9&ndash;1.0 pc</em>
              </label>
            </li>
            <li>
              <label class="filter-row">
                <input id="gammaLink" type="checkbox" />
                <span class="filter-name">Gamma</span>
                <em class="filter-range">1.5&ndash;1.7 pc</em>
              </label>
            </li>
            <li>
              <label class="filter-row">
                <input id="deltaLink" type="checkbox" />
                <span class="filter-name">Delta</span>
                <em class="filter-range">2.4&ndash;2.7 pc</em>
              </label>
            </li>
            <li>
              <label class="filter-row">
                <input id="epsiLink" type="checkbox" />
                <span class="filter-name">Epsilon</span>
                <em class="filter-range">3.9&ndash;4.4 pc</em>
              </label>
            </li>
          </ul>
        </section>
        <section class="control-section">
          <div class="section-header">Named Worlds</div>
          <div id="planetList"></div>
        </section>
      </div>
    </div>
    <aside id="systemDetail" aria-label="System details" hidden>
      <button id="systemDetailClose" aria-label="Close (Esc)" title="Close (Esc)">&times;</button>
      <div id="systemDetailContent"></div>
    </aside>
    <div id="container"></div>
    <div id="labels"></div>
    <script type="module" src="scripts/app.ts"></script>
  </body>
</html>
